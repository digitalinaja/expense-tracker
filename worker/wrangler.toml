name = "expense-tracker-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Environment variables (shared across all environments)
# Secrets are loaded from .dev.vars file for local development (gitignored)
# For production: use `wrangler secret put JWT_SECRET --env production`
vars = { ENVIRONMENT = "development" }

[env.production]
# Production secrets should be set via: wrangler secret put <SECRET_NAME> --env production
# Never commit secrets to this file!
vars = { ENVIRONMENT = "production" }

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "expense-tracker-db"
database_id = "77bae638-fe3f-412d-86d5-b258c7a10e1a"
migrations_dir = "../d1/migrations"

# KV Namespace binding (optional, for caching)
[[kv_namespaces]]
binding = "KV"
id = "8fe58048e60e4e20b6472c56b2247c94" # Replace with actual KV namespace ID if needed
