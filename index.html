<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Pengeluaran</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tracker Pengeluaran</h1>
            <p>Atur dan catat pengeluaran Anda</p>
        </header>

        <!-- Input Section with Tabs -->
        <div class="input-section">
            <div class="tabs">
                <button class="tab-btn active" data-tab="expense">Pengeluaran</button>
                <button class="tab-btn" data-tab="planning">Perencanaan</button>
            </div>

            <div class="tab-content active" id="expense-tab">
                <form id="expenseForm">
                    <input type="text" id="expenseName" placeholder="Nama Pengeluaran" required>
                    <input type="number" id="expenseAmount" placeholder="Jumlah (Rp)" step="1000" required>
                    <input type="date" id="expenseDate" required>
                    <button type="submit">Tambah Pengeluaran</button>
                </form>
            </div>

            <div class="tab-content" id="planning-tab">
                <form id="planningForm">
                    <input type="text" id="planningName" placeholder="Nama Perencanaan" required>
                    <input type="number" id="planningAmount" placeholder="Jumlah (Rp)" step="1000" required>
                    <input type="date" id="planningDate" required>
                    <button type="submit">Tambah Perencanaan</button>
                </form>
            </div>
        </div>

        <!-- Summary Section -->
        <div class="summary-section">
            <h2>Ringkasan</h2>
            <div id="summary">
                <div class="summary-card">
                    <span class="summary-label">Total Pengeluaran</span>
                    <span class="summary-value expense" id="totalExpense">Rp 0</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">Total Perencanaan</span>
                    <span class="summary-value planning" id="totalPlanning">Rp 0</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">Saldo Sisa</span>
                    <span class="summary-value balance" id="remainingBalance">Rp 0</span>
                </div>
            </div>
        </div>

        <!-- History Section with Tabs -->
        <div class="history-section">
            <h2>Riwayat</h2>
            <div class="tabs history-tabs">
                <button class="tab-btn active" data-tab="expense-history">Riwayat Pengeluaran</button>
                <button class="tab-btn" data-tab="planning-history">Riwayat Perencanaan</button>
            </div>

            <div class="tab-content active" id="expense-history-tab">
                <ul id="expenseList"></ul>
                <div class="empty-state" id="expenseEmptyState">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 17H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-4"/>
                        <polyline points="9 12 12 15 15 12"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <p>Belum ada pengeluaran</p>
                </div>
            </div>

            <div class="tab-content" id="planning-history-tab">
                <ul id="planningList"></ul>
                <div class="empty-state" id="planningEmptyState">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <p>Belum ada perencanaan</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
